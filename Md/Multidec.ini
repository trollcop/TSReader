; ************************ DVB-Timing ***************************
; *                                                             *
; *         Diese Funktionen sind nur in der INI zu ändern.     *
; *                                                             *
; * Die Timer können die Umschaltzeiten etc. verkürzen, aber    *
; * auch den ARM - Prozessor der DVB-Karte aufhängen.           *
; * Wer mit diesen Werten rumspielt, sollte mit dem Schalter    *
; * WRITE_LOG eine Protokoll-Datei erzeugen, um die Ergebnisse  *
; * zu uberprüfen bzw. die Funktionalität beobachten!           *
; *                                                             *
; ***************************************************************
; 
; TIMING-WriteRegDelay                    Nach jedem Senden über den I2C-Bus wird XX Millisekunden gewartet.
;                                         Hat für die Geschwindigkeit / den Zugriff auf den I2C-Bus immense 
;                                         Bedeutung
;                                         Default für DVB-S = 0 
;                                         Default für DVB-C = 2 
TIMING-WriteRegDelay=0;
; 
; TIMING-I2C_Bus_Timeout                  Nach jedem Senden über den I2C-Bus wird maximal XX Millisekunden gewartet,
;                                         bis das Kommando bestätigt wird. Wird es innerhalt dieser Zeit nicht quittiert,
;                                         wird der Befehl wiederholt.
;                                         Fehlerhafte Werte erzeugen in der Log-Datei Meldungen mit : 
;                                                     SAA7146 Master_Xfer  XXXXXXXXXXXXXXXXXXXXXXXXXX
;                                         ( Die Wiederholung des Befehles dauert länger als das was man einspart !!
;                                         Wird das vorher quittiert ist der Sleep auch vorher beendet !!
;                                         Sollte bei häufigen SAA7146 Master_Xfer Fehlern hochgesetzt werden
;                                         Default 200 ms (maximale Wartezeit) 
TIMING-I2C_Bus_Timeout=200;
; 
; TIMING-I2C_Bus_Reset_Delay              Reset-Verzögerung bei I2C-Bus-Fehler
;                                         Eigentlich soll der I2C-Bus-Fehler vermieden werden ( Bis auf bei der 
;                                              TRUE  : Log-Datei erzeugen 
;                                         Zum Resetten braucht die Karte etwas Zeit 
;                                         Default 10 ms 
TIMING-I2C_Bus_Reset_Delay=10;
; 
; TIMING-DVB_Reset_Wait                   Nach dem Umschalten bzw beim Scannen kann es abhängig von der Karte 
;                                         bzw SAT-Anlage oder Kabel etwas dauern bis der LOCK anspringt.
;                                         Dieser Parameter hat Einfluss auf die Scan bzw. Umschaltzeit. 
;                                         Werden beim Scannen nicht alle Transponder / Frequenzen erkannt, sollte der 
;                                         Wert mal etwas Hochgesetzt werden. Bei meiner Karte/Anlage fahre ich mit 0 !!
;                                         Default 5 ms ???
TIMING-DVB_Reset_Wait=5;
; 
; TIMING-DVB_Reset_Scan_Wait              Der DVB_Reset_Wait wird beim Umschalten mit angezogen. Da beim Scannen wohl
;                                         größere Werte notwendig sind ( DVB-c ?? ) habe ich diesen Parameter nun geteilt.
;                                            TIMING-DVB_Reset_Wait gilt beim Umschalten.
;                                            TIMING-DVB_Reset_Scan_Wait gilt beim Scannen.
;
;                                         Beschreibung siehe DVB_Reset_Wait !!
;                                         Default 15 ms ???
TIMING-DVB_Reset_Scan_Wait=15;
;
; TIMING-SendDiSEqCDelay                  Nach dem Umschalten bzw beim Scannen kann es abhängig von der Karte 
;                                         bzw SAT-Anlage notwendig sein, zwischen den DiSEq-Kommandos Pausen einzulegen
;                                         Dieser Parameter hat Einfluss auf die Scan bzw. Umschaltzeit. 
;                                         Werden beim Scannen /Umschalten von einer LNB auf die nächste hat, sollte mal an
;                                         diesem Parameter schrauben. <Ich habe leider nur ASTRA>
;                                         Default 100 ms ???
; 
TIMING-SendDiSEqCDelay=100;
; 
; TIMING-Pmt_TimeOut                      Maximale Wartezeit bis behauptet wird ein Transponder / eine Frequenz hat keinen PMT 
;                                         Dieser Parameter hat Einfluss auf die Scan-Zeit 
;                                         Default 2500 ms 
TIMING-Pmt_TimeOut=2500;
; 
; TIMING-Sdt_TimeOut                      Maximale Wartezeit bis behauptet wird ein Transponder / eine Frequenz hat keinen SDT
;                                         Dieser Parameter hat Einfluss auf die Scan-Zeit 
;                                         Default 2500 ms 
TIMING-Sdt_TimeOut=2500;
; 
; TIMING-Pat_TimeOut                      Maximale Wartezeit bis behauptet wird ein Transponder / eine Frequenz hat keinen PAT
;                                         Dieser Parameter hat Einfluss auf die Scan-Zeit 
;                                         Default 2500 ms 
TIMING-Pat_TimeOut=2500;
; 
; TIMING-Cat_TimeOut                      Maximale Wartezeit bis behauptet wird ein Transponder / eine Frequenz hat keinen CAT
;                                         Dieser Parameter hat Einfluss auf die Scan-Zeit 
;                                         Default 2500 ms 
TIMING-Cat_TimeOut=2500;
; 
; TIMING-Nit_TimeOut                      Maximale Wartezeit bis behauptet wird ein Transponder / eine Frequenz hat keinen NIT
;                                         Dieser Parameter hat Einfluss auf die Scan-Zeit 
;                                         Default 2500 ms 
TIMING-Nit_TimeOut=2500;
; 
; TIMING-Debi_Cmd_Time_Out                KERNEL-PARAMETER (Liegt im Treiber MDSAA)
;                                         Maximale Wartezeit bis ein Debi-Kommando ausgeführt werden sollte
;                                         Innerhalb dieser Warteschleife wird kein weiterer IRQ (der DVB-Karte ) ausgeführt
;                                         Wird das Kommando ausgeführt, ist die Schleife vorher beendet und alles wird freigegeben.
;                                         Ist die Wartezeit zu klein, läuft der ARM-Prozessor in der Befehlsausführung weiter, 
;                                         aber das nächste Kommando oder ein IRQ kann u.U. den ARM zerbröseln. ( War eines meiner Probleme )
;                                         Der richtige Wert hängt vom Rechner(auslastung)/Empfangsvolumen(Bytes/s)/DVB-Karte ab.
;                                         Hinweis in der Log_Datei, das diese Warteschleife mal zu klein war :
;                                                 SAA7146 Sync_KP_Call Debi_Command nicht innerhalb vom TimeOut ausgeführt
;                                         Sollte besser nicht zu oft vorkommen
;                                         Default 15000 (Schleife im Treiber)
TIMING-Debi_Cmd_Time_Out=15000;
; 
; TIMING-OSD_Text_Time_Out                KERNEL-PARAMETER (Liegt im Treiber MDSAA)
;                                         Maximale Wartezeit bis ein Debi-Kommando mit Ausgabe von OSD-Text ausgeführt werden sollte!
;                                         Innerhalb dieser Warteschleife wird kein weiterer IRQ (der DVB-Karte ) ausgeführt
;                                         Wird das Kommando ausgeführt, ist die Schleife vorher beendet und alles wird freigegeben.
;                                         Ist die Wartezeit zu klein, läuft der ARM-Prozessor in der Befehlsausführung weiter, 
;                                         aber das nächste Kommando oder ein IRQ kann u.U. den ARM zerbröseln. ( War eines meiner Probleme )
;                                         Der richtige Wert hängt vom Rechner(auslastung)/Empfangsvolumen(Bytes/s)/DVB-Karte ab.
;                                         Hinweis in der Log_Datei, das diese Warteschleife mal zu klein war :
;                                                 SAA7146 Sync_KP_Call TextPuffer nicht innerhalb vom TimeOut geleehrt 
;                                                 SAA7146 Sync_KP_Call Debi_Command und TextPuffer nicht innerhalb vom TimeOut geleehrt
;                                         Sollte besser nicht zu oft vorkommen
;                                         Default 60000 (Schleife im Treiber)
TIMING-OSD_Text_Time_Out=60000;
; 
; TIMING-Debi_done_MC2                    KERNEL-PARAMETER (Liegt im Treiber MDSAA)
;                                         Maximale Wartezeit bis ein Debi-Datentransfer eingeleitet wird !!
;                                         Innerhalb dieser Warteschleife wird kein weiterer IRQ (der DVB-Karte ) ausgeführt
;                                         Wird der Transfer vom ARM eingeleutet. ist die Schleife vorher beendet und alles wird freigegeben.
;                                         Ist die Wartezeit zu klein, läuft der ARM-Prozessor in der Befehlsausführung weiter, 
;                                         aber das nächste Kommando oder ein IRQ kann u.U. den ARM zerbröseln. ( War eines meiner Probleme )
;                                         Der richtige Wert hängt vom Rechner(auslastung)/Empfangsvolumen(Bytes/s)/DVB-Karte ab.
;                                         Hinweis in der Log_Datei, das diese Warteschleife mal zu klein war :
;                                                 SAA7146 Debi_done_MC2 TimeOut 
;                                         Sollte besser nicht zu oft vorkommen
;                                         Default 2000 (Schleife im Treiber)
TIMING-Debi_done_MC2=2000;
; 
; TIMING-Debi_done_PSR                    KERNEL-PARAMETER (Liegt im Treiber MDSAA)
;                                         Maximale Wartezeit bis ein Debi-Datentransfer eingeleitet wird !!
;                                         Innerhalb dieser Warteschleife wird kein weiterer IRQ (der DVB-Karte ) ausgeführt
;                                         Wird der Transfer vom ARM eingeleutet. ist die Schleife vorher beendet und alles wird freigegeben.
;                                         Ist die Wartezeit zu klein, läuft der ARM-Prozessor in der Befehlsausführung weiter, 
;                                         aber das nächste Kommando oder ein IRQ kann u.U. den ARM zerbröseln. ( War eines meiner Probleme )
;                                         Der richtige Wert hängt vom Rechner(auslastung)/Empfangsvolumen(Bytes/s)/DVB-Karte ab.
;                                         Hinweis in der Log_Datei, das diese Warteschleife mal zu klein war :
;                                                 SAA7146 Debi_done_MC2 TimeOut 
;                                         Sollte besser nicht zu oft vorkommen
;                                         Default 10000 (Schleife im Treiber)
TIMING-Debi_done_PSR=10000;
