; ******************************************
; **         Die folgenden Einträge       **
; **         sollten nicht von Hand       **
; **            editiert werden           **
; **                                      **
; ** Beispiel:                            **
; ** MIXER_VOLUME_CONTROL=AAA BBB CCC DDD **
; **                                      **
; ** AAA identifiziert das Soundsubsystem **
; **     das auszusprechen ist.           **
; **                                      **
; ** BBB identifiziert den Ausgang, der   **
; **     auszusprechen ist.               **
; **                                      **
; ** CCC identifiziert den dazugehörigen  **
; **     Eingang                          **
; **                                      **
; ** DDD steht für das Control            **
; **                                      **
; ** Wenn iht in den Dialog unter Ausgabe **
; **  -> Audio-Mixer Einstellungen geht   **
; ** und dort auf zuweisen klickt, so     **
; ** wird euch für jedes Control die      **
; ** Interne ID angegeben.                **
; **                                      **
; ** Bei den Settings in MIXER_BOOT_UP    **
; **          (Wenn vorhanden)            **
; ** sind 4 weitere Werte enthalten,      **
; ** Diese Werte werden in die maximal 4  **
; ** Kanäle zum Startzeitpunkt eingestellt**
; **                                      **
; ******************************************
;
MIXER_VOLUME_CONTROL=-01 000 000 000 ;  Control-Einstellungen für Volume 
MIXER_MUTE_CONTROL=-01 000 000 000 ;  Control-Einstellungen für Mute 
